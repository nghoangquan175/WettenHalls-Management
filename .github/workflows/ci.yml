name: CI Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  frontend-check:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Run Lint
        working-directory: ./frontend
        run: npm run lint
        
      - name: Build Project
        working-directory: ./frontend
        run: npm run build

  backend-check:
    name: Backend (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci
        
      - name: Run Lint
        working-directory: ./backend
        run: npm run lint
        
      - name: Build Project
        working-directory: ./backend
        run: npm run build
